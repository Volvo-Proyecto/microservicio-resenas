server:
  port: ${PORT:8086}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: never

  jpa:
    defer-datasource-initialization: false
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

# URLs dinámicas en la nube que se llenarán desde el panel de Railway
services:
  usuario:
    url: ${SERVICES_USUARIO_URL:http://localhost:8085/api/v1/usuarios}
  juego:
    url: ${SERVICES_JUEGO_URL:http://localhost:8083/api/v1/juegos}