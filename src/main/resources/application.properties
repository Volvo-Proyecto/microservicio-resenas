spring.application.name=resenas
server.port=8086

# Configuración de la base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/db_volvo_resenas
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA/Hibernate
#spring.sql.init.mode=always
#spring.sql.init.data-locations=classpath:data.sql
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

services.usuario.url=http://localhost:8085/api/v1/usuarios
services.juego.url=http://localhost:8083/api/v1/juegos