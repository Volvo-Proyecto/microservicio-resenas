server:
  port: 8086

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/db_volvo_resenas
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: always

  jpa:
    defer-datasource-initialization: true
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

# URLs locales para la comunicación entre microservicios (WebClient)
services:
  usuario:
    url: http://localhost:8085/api/v1/usuarios
  juego:
    url: http://localhost:8083/api/v1/juegos